# Dockhand configuration
# Full documentation: https://github.com/izm1chael/dockhand

poll_interval: 10m
manage_latest_only: true
opt_out: true
notification_level: all
dry_run: false
sanitize_names: true
pin_digests: false
max_concurrent_updates: 1

# patch_window: "00:00-02:00"

verify_timeout: 10s
verify_interval: 500ms
hook_timeout: 5m
circuit_breaker_threshold: 3
circuit_breaker_cooldown: 10m

host_socket_path: /var/run/docker.sock

# docker_hosts:
#   - unix:///var/run/docker.sock
#   - tcp://192.168.1.5:2375

# --- Metrics (opt-in) ---
metrics_enabled: false
metrics_port: 9090

# --- InfluxDB (opt-in) ---
