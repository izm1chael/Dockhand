# .goreleaser.yaml
version: 2

project_name: dockhand

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    binary: dockhand
    main: ./cmd/dockhand

archives:
  - format: tar.gz
    # use zip for windows
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

nfpms:
  - id: dockhand
    package_name: dockhand
    vendor: izm1chael
    homepage: https://github.com/izm1chael/dockhand
    maintainer: izm1chael <noreply@github.com>
    description: |
      Dockhand is a lightweight Docker container auto-update daemon.
      It polls registries and safely recreates containers when new
      image versions are available, with rollback on failure.
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    contents:
      - src: packaging/dockhand.service
        dst: /usr/lib/systemd/system/dockhand.service
      - src: packaging/config/dockhand.yaml
        dst: /etc/dockhand/config.yaml
        type: config|noreplace
        file_info:
          mode: 0640
      - dst: /var/lib/dockhand
        type: dir
        file_info:
          mode: 0750
    scripts:
      postinstall: packaging/scripts/postinstall.sh
      preremove: packaging/scripts/preremove.sh
    deb:
      fields:
        Recommends: docker-ce | docker.io
    rpm:
      summary: Docker container auto-update daemon
      group: System Environment/Daemons
      compression: gzip

release:
  footer: |
    ## Docker Images
    
    Run the following to pull this specific version:
    
    ```bash
    # GitHub Container Registry
    docker pull ghcr.io/izm1chael/dockhand:{{ .Tag }}
    
    # Docker Hub
    docker pull izm1chael/dockhand:{{ .Tag }}
    ```
    
    ## Quick Start
    
    * **[ View Standard docker-compose.yml](https://github.com/izm1chael/dockhand/blob/main/docker-compose.yml)**
    * **[ View Documentation](https://github.com/izm1chael/dockhand#readme)**
